name: Deploy

on:
  release:
    types: [created]
  workflow_dispatch:

env:
  APP_NAME: seekcode
  APP_VERSION: 0.1.0

jobs:
  build:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build Windows bundles
        run: cargo tauri build --bundles nsis,msi

      - name: Collect Windows artifacts
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $artifactDir = Join-Path $PWD "artifacts"
          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null

          $searchRoots = @("target", "src-tauri\target") | Where-Object { Test-Path $_ }
          if (-not $searchRoots) {
            throw "No Cargo target directory was found."
          }

          $exe = Get-ChildItem -Path $searchRoots -Recurse -File -Filter "${env:APP_NAME}.exe" |
            Where-Object { $_.FullName -match "\\release\\${env:APP_NAME}\.exe$" -and $_.FullName -notmatch "\\deps\\" } |
            Select-Object -First 1
          if (-not $exe) {
            throw "Could not find ${env:APP_NAME}.exe."
          }

          $msiName = "${env:APP_NAME}_${env:APP_VERSION}_x64_en-US.msi"
          $msi = Get-ChildItem -Path $searchRoots -Recurse -File -Filter $msiName | Select-Object -First 1
          if (-not $msi) {
            throw "Could not find $msiName."
          }

          $setupName = "${env:APP_NAME}_${env:APP_VERSION}_x64-setup.exe"
          $setup = Get-ChildItem -Path $searchRoots -Recurse -File -Filter $setupName | Select-Object -First 1
          if (-not $setup) {
            throw "Could not find $setupName."
          }

          Copy-Item -LiteralPath $exe.FullName -Destination (Join-Path $artifactDir "${env:APP_NAME}_${env:APP_VERSION}_x64.exe")
          Copy-Item -LiteralPath $msi.FullName -Destination (Join-Path $artifactDir $msiName)
          Copy-Item -LiteralPath $setup.FullName -Destination (Join-Path $artifactDir $setupName)

          Get-ChildItem -Path $artifactDir

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: artifacts/*
          if-no-files-found: error

  deploy:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: List
        run: find ./artifacts

      - name: Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ./artifacts/windows-x64/*
          tag: ${{ github.ref_name }}
          overwrite: true
          file_glob: true
